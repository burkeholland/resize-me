<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResizeMe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: #0b0f14;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; opacity: 0.03; z-index: 1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Ambient glows */
.glow-coral {
  position: absolute; top: -120px; right: -80px; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,127,80,0.18) 0%, transparent 70%);
  filter: blur(80px); pointer-events: none;
}
.glow-azure {
  position: absolute; bottom: -140px; left: -60px; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
  filter: blur(80px); pointer-events: none;
}

.content {
  position: relative; z-index: 2;
  text-align: center;
  padding: 60px 32px;
  max-width: 880px;
}

/* Giant mono wordmark */
.wordmark {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(4rem, 14vw, 11rem);
  font-weight: 800;
  letter-spacing: -0.07em;
  line-height: 0.85;
  color: #e2e8f0;
  margin-bottom: 32px;
}
.wordmark .dot { color: #84cc16; }

/* Tagline */
.tagline {
  font-size: 17px;
  color: #64748b;
  margin-bottom: 48px;
  letter-spacing: 0.2px;
  line-height: 1.6;
}

/* Oversized hotkey display */
.hotkey-display {
  display: inline-flex;
  gap: 10px;
  margin-bottom: 48px;
}
.hotkey-display kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 700;
  padding: 14px 22px;
  border-radius: 12px;
  background: #111820;
  border: 2px solid rgba(255,255,255,0.08);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.04) inset;
  color: #e2e8f0;
  transition: all 0.15s ease;
}
.hotkey-display kbd.accent {
  border-color: rgba(255,127,80,0.5);
  color: #ff7f50;
  box-shadow: 0 4px 16px rgba(255,127,80,0.15), 0 1px 0 rgba(255,255,255,0.04) inset;
}

/* Install pill */
.install-pill {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: #111820;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 9999px;
  padding: 10px 10px 10px 22px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #64748b;
  margin-bottom: 56px;
}
.install-pill .dl-btn {
  background: linear-gradient(135deg, #ff7f50, #0ea5e9);
  color: #fff;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 9999px;
  font-size: 13px;
  text-decoration: none;
  font-family: 'Outfit', sans-serif;
  box-shadow: 0 4px 12px rgba(14,165,233,0.25);
  transition: transform 0.2s, box-shadow 0.2s;
}
.install-pill .dl-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(14,165,233,0.35);
}

/* Stats row */
.stats {
  display: flex;
  justify-content: center;
  gap: 48px;
}
.stats .stat { text-align: center; }
.stats .stat .val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 700;
  color: #e2e8f0;
}
.stats .stat .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #64748b;
  margin-top: 4px;
}

/* Meta line */
.meta {
  margin-top: 56px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #334155;
  letter-spacing: 0.5px;
}

@media (max-width: 600px) {
  .hotkey-display { gap: 6px; }
  .hotkey-display kbd { padding: 10px 14px; font-size: 18px; }
  .stats { gap: 24px; flex-wrap: wrap; }
  .install-pill { flex-direction: column; border-radius: 16px; padding: 16px; gap: 12px; }
}
</style>
</head>
<body>
  <div class="glow-coral"></div>
  <div class="glow-azure"></div>

  <div class="content">
    <div class="wordmark">resize<span class="dot">.</span>me</div>

    <p class="tagline">Pixel-exact window sizing for people who ship pixels.<br/>One shortcut. Perfect size. Every time.</p>

    <div class="hotkey-display">
      <kbd>Ctrl</kbd><kbd>Alt</kbd><kbd class="accent">R</kbd>
    </div>

    <div class="install-pill">
      <span>v1.0 · Windows · ~10 MB</span>
      <a href="https://github.com/burkeholland/resize-me/releases/latest" class="dl-btn">Download Free</a>
    </div>

    <div class="stats">
      <div class="stat"><div class="val">18</div><div class="label">Presets</div></div>
      <div class="stat"><div class="val">1</div><div class="label">Hotkey</div></div>
      <div class="stat"><div class="val">0</div><div class="label">CPU overhead</div></div>
    </div>

    <p class="meta">No install required · No data collected · Lives in your system tray</p>
  </div>
</body>
</html>
