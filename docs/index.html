<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResizeMe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: #0b0f14;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow-x: hidden;
  overflow-y: auto;
  position: relative;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; opacity: 0.03; z-index: 1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Ambient glows */
.glow-coral {
  position: absolute; top: -120px; right: -80px; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,127,80,0.18) 0%, transparent 70%);
  filter: blur(80px); pointer-events: none;
}
.glow-azure {
  position: absolute; bottom: -140px; left: -60px; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
  filter: blur(80px); pointer-events: none;
}

.content {
  position: relative; z-index: 2;
  text-align: center;
  padding: 60px 32px;
  max-width: 880px;
}

.action-stack {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 42px;
}

/* Giant mono wordmark */
.wordmark {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(4rem, 14vw, 11rem);
  font-weight: 800;
  letter-spacing: -0.07em;
  line-height: 0.85;
  color: #e2e8f0;
  margin-bottom: 32px;
}
.wordmark .dot { color: #84cc16; }

/* Tagline */
.tagline {
  font-size: 17px;
  color: #64748b;
  margin-bottom: 48px;
  letter-spacing: 0.2px;
  line-height: 1.6;
}

/* Animated resize demo */
.morph-demo {
  display: flex;
  justify-content: center;
  margin-top: 10px;
  margin-bottom: 24px;
}

.morph-frame {
  position: relative;
  width: min(540px, 92vw);
  height: 230px;
  border-radius: 18px;
  background: transparent;
  box-shadow: none;
  overflow: hidden;
}

.morph-window {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 320px;
  height: 190px;
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(17,24,32,0.98) 0%, rgba(11,15,20,0.95) 100%);
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: 0 18px 44px rgba(0,0,0,0.38), 0 1px 0 rgba(255,255,255,0.04) inset;
  overflow: hidden;
  transform: translate(-50%, -50%) scale(1);
  transform-origin: center center;
  animation: resizeMorph 3.6s ease-in-out infinite;
}

.morph-window::before {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 28px;
  background: linear-gradient(90deg, rgba(255,127,80,0.25), rgba(14,165,233,0.2));
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.morph-window::after {
  content: '1920 × 1080  →  1280 × 720';
  position: absolute;
  bottom: 10px;
  right: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3px;
  color: rgba(226,232,240,0.72);
}

@keyframes resizeMorph {
  0%, 100% {
    transform: translate(-50%, -50%) scale(1);
  }
  45%, 55% {
    transform: translate(-50%, -50%) scale(0.7);
  }
}

/* Oversized hotkey display */
.hotkey-display {
  display: inline-flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  margin-bottom: 0;
}
.hotkey-display kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 700;
  padding: 14px 22px;
  border-radius: 12px;
  background: #111820;
  border: 2px solid rgba(255,255,255,0.08);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.04) inset;
  color: #e2e8f0;
  transition: all 0.15s ease;
}
.hotkey-display kbd.accent {
  border-color: rgba(255,127,80,0.5);
  color: #ff7f50;
  box-shadow: 0 4px 16px rgba(255,127,80,0.15), 0 1px 0 rgba(255,255,255,0.04) inset;
}

/* Install pill */
.install-pill {
  display: inline-flex;
  flex-direction: row;
  align-items: center;
  gap: 0;
  margin-bottom: 0;
  position: relative;
}
.install-pill .dl-btn {
  background: linear-gradient(135deg, #ff7f50, #0ea5e9);
  color: #fff;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 9999px;
  font-size: 13px;
  text-decoration: none;
  font-family: 'Outfit', sans-serif;
  box-shadow: 0 4px 12px rgba(14,165,233,0.25);
  transition: transform 0.2s, box-shadow 0.2s;
}
.install-pill .dl-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(14,165,233,0.35);
}

.download-menu {
  position: relative;
}

.download-list {
  position: absolute;
  right: 0;
  top: calc(100% + 8px);
  list-style: none;
  margin: 0;
  padding: 8px;
  min-width: 220px;
  background: #0f1720;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.45);
  display: none;
  z-index: 10;
}

.download-menu.open .download-list {
  display: block;
}

.download-list a {
  display: block;
  color: #e2e8f0;
  text-decoration: none;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  padding: 10px 12px;
  border-radius: 8px;
}

.download-list a:hover {
  background: rgba(255,255,255,0.08);
}

/* Stats row */
.stats {
  display: flex;
  justify-content: center;
  gap: 48px;
}
.stats .stat { text-align: center; }
.stats .stat .val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 700;
  color: #e2e8f0;
}
.stats .stat .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #64748b;
  margin-top: 4px;
}

/* Meta line */
.meta {
  margin-top: 56px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #334155;
  letter-spacing: 0.5px;
}

@media (max-width: 600px) {
  .action-stack {
    gap: 12px;
  }
  .morph-frame {
    height: 190px;
  }
  .morph-window {
    width: 250px;
    height: 150px;
  }
  .hotkey-display { gap: 6px; }
  .hotkey-display kbd { padding: 10px 14px; font-size: 18px; }
  .stats { gap: 24px; flex-wrap: wrap; }
  .download-list {
    left: 0;
    right: 0;
    min-width: 0;
  }
}
</style>
</head>
<body>
  <div class="glow-coral"></div>
  <div class="glow-azure"></div>

  <div class="content">
    <div class="wordmark">resize<span class="dot">.</span>me</div>

    <p class="tagline">Pixel-exact window sizing for people who ship pixels.<br/>One shortcut. Perfect size. Every time.</p>

    <div class="action-stack">
      <div class="hotkey-display">
        <kbd id="key-1">Ctrl</kbd><kbd id="key-2">Alt</kbd><kbd class="accent" id="key-3">R</kbd>
      </div>

      <div class="install-pill">
        <div class="download-menu" id="download-menu">
          <button id="download-toggle" class="dl-btn" type="button" aria-expanded="false" aria-controls="download-list">Download ▾</button>
          <ul id="download-list" class="download-list" role="menu" aria-label="Download options">
            <li role="none"><a role="menuitem" id="mac-link" href="https://github.com/burkeholland/resize-me/releases?q=-mac">macOS</a></li>
            <li role="none"><a role="menuitem" id="windows-link" href="https://github.com/burkeholland/resize-me/releases/latest">Windows</a></li>
          </ul>
        </div>
      </div>
    </div>

    <div class="morph-demo" aria-hidden="true">
      <div class="morph-frame">
        <div class="morph-window"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="val">18</div><div class="label">Presets</div></div>
      <div class="stat"><div class="val">1</div><div class="label">Hotkey</div></div>
      <div class="stat"><div class="val">0</div><div class="label">CPU overhead</div></div>
    </div>

    <p class="meta">Download the app for your OS · No data collected · Lives in your menu bar or tray</p>
  </div>

  <script>
    (function () {
      const ua = navigator.userAgent || '';
      const isMac = /Mac/i.test(ua);
      const isWindows = /Win/i.test(ua);
      const key1 = document.getElementById('key-1');
      const key2 = document.getElementById('key-2');
      const key3 = document.getElementById('key-3');
      const macLink = document.getElementById('mac-link');
      const windowsLink = document.getElementById('windows-link');
      const downloadMenu = document.getElementById('download-menu');
      const downloadToggle = document.getElementById('download-toggle');

      if (isMac) {
        key1.textContent = '⌃';
        key2.textContent = '⌥';
        key3.textContent = 'R';
        macLink.style.color = '#ffb08f';
      } else if (isWindows) {
        key1.textContent = 'Ctrl';
        key2.textContent = 'Alt';
        key3.textContent = 'R';
        windowsLink.style.color = '#9edbff';
      } else {
        key1.textContent = 'Ctrl';
        key2.textContent = 'Alt/Option';
        key3.textContent = 'R';
      }

      downloadToggle.addEventListener('click', function () {
        const isOpen = downloadMenu.classList.toggle('open');
        downloadToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });

      document.addEventListener('click', function (event) {
        if (!downloadMenu.contains(event.target)) {
          downloadMenu.classList.remove('open');
          downloadToggle.setAttribute('aria-expanded', 'false');
        }
      });
    })();
  </script>
</body>
</html>
