<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ResizeMe social preview image</title>
  <desc id="desc">Promotional banner for ResizeMe with text about one-hotkey window resizing on macOS and Windows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7f50"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="40" r="240" fill="#ff7f50" opacity="0.2"/>
  <circle cx="120" cy="590" r="240" fill="#0ea5e9" opacity="0.2"/>
  <rect x="100" y="124" width="1000" height="382" rx="26" fill="#0f1720" stroke="#334155"/>
  <text x="160" y="240" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="94" font-weight="800" fill="#e2e8f0">resize<tspan fill="#84cc16">.</tspan>me</text>
  <text x="160" y="306" font-family="Outfit, Inter, Arial, sans-serif" font-size="34" font-weight="600" fill="#cbd5e1">Pixel-perfect window sizing with one hotkey</text>
  <rect x="160" y="352" width="444" height="68" rx="34" fill="url(#accent)"/>
  <text x="382" y="396" text-anchor="middle" font-family="Outfit, Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">macOS + Windows</text>
  <text x="160" y="456" font-family="Outfit, Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#94a3b8">Fast presets • Zero telemetry • Free download</text>
</svg>
