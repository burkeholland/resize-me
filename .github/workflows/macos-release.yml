name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*-mac'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o certificate.p12
          CERTIFICATE_SIZE=$(wc -c < certificate.p12 | tr -d ' ')
          echo "Decoded certificate.p12 (${CERTIFICATE_SIZE} bytes)."
          if [ "$CERTIFICATE_SIZE" -lt 1000 ]; then
            echo "::error::DEVELOPER_ID_CERTIFICATE_BASE64 decoded to a very small file. Re-export the Developer ID Application identity as a .p12 and base64-encode that file."
            exit 1
          fi
          if ! openssl pkcs12 \
            -legacy \
            -in certificate.p12 \
            -passin "pass:$CERTIFICATE_PASSWORD" \
            -nokeys \
            -clcerts \
            -noout >/dev/null; then
            echo "::error::Decoded certificate is not a valid password-protected PKCS#12 identity. Check DEVELOPER_ID_CERTIFICATE_BASE64 and DEVELOPER_ID_CERTIFICATE_PASSWORD."
            exit 1
          fi
          if ! openssl pkcs12 \
            -legacy \
            -in certificate.p12 \
            -passin "pass:$CERTIFICATE_PASSWORD" \
            -nocerts \
            -noout >/dev/null; then
            echo "::error::Decoded PKCS#12 file does not contain a readable private key. Export the Developer ID Application identity from Keychain Access > My Certificates, not the certificate alone."
            exit 1
          fi
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "::error::No Developer ID Application signing identity was imported. Re-export the certificate from Keychain Access > My Certificates with its private key."
            exit 1
          fi
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          rm -f certificate.p12

      - name: Build Release app
        working-directory: ResizeMeMac
        run: |
          rm -rf .derivedData
          xcodebuild \
            -project ResizeMe.xcodeproj \
            -scheme ResizeMe \
            -configuration Release \
            -derivedDataPath .derivedData \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY='-' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Sign app
        working-directory: ResizeMeMac
        run: |
          set -euo pipefail
          APP_PATH=".derivedData/Build/Products/Release/ResizeMe.app"
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" -type d -name "*.xpc" -print | while IFS= read -r ITEM; do
              codesign --force --verify --verbose=2 \
                --sign "$SIGNING_IDENTITY" \
                --options runtime \
                --timestamp "$ITEM"
            done
            find "$APP_PATH/Contents/Frameworks" -type d -name "*.framework" -prune -print | while IFS= read -r ITEM; do
              codesign --force --verify --verbose=2 \
                --sign "$SIGNING_IDENTITY" \
                --options runtime \
                --timestamp "$ITEM"
            done
            find "$APP_PATH/Contents/Frameworks" -type f -name "*.dylib" -print | while IFS= read -r ITEM; do
              codesign --force --verify --verbose=2 \
                --sign "$SIGNING_IDENTITY" \
                --options runtime \
                --timestamp "$ITEM"
            done
          fi
          codesign --force --verify --verbose=2 \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --timestamp "$APP_PATH"
          codesign --verify --strict --verbose=2 "$APP_PATH"

      - name: Package notarization ZIP
        working-directory: ResizeMeMac
        run: |
          ditto -c -k --sequesterRsrc \
            .derivedData/Build/Products/Release/ResizeMe.app \
            ../ResizeMe.zip

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_PATH="ResizeMeMac/.derivedData/Build/Products/Release/ResizeMe.app"
          xcrun notarytool submit ResizeMe.zip \
            --apple-id "$APPLE_ID" \
            --password "$APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json > notarization.json
          cat notarization.json
          STATUS=$(/usr/bin/python3 -c 'import json; print(json.load(open("notarization.json"))["status"])')
          REQUEST_ID=$(/usr/bin/python3 -c 'import json; print(json.load(open("notarization.json"))["id"])')
          if [ "$STATUS" != "Accepted" ]; then
            xcrun notarytool log "$REQUEST_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              notarization-log.json || true
            if [ -f notarization-log.json ]; then
              cat notarization-log.json
            fi
            echo "::error::Notarization failed with status: $STATUS"
            exit 1
          fi
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          rm -f ResizeMe.zip
          ditto -c -k --sequesterRsrc "$APP_PATH" ResizeMe.zip

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SPARKLE_BIN=$(find ResizeMeMac/.derivedData/SourcePackages/artifacts -path '*/Sparkle/bin' -type d | head -n 1)
          if [ -z "$SPARKLE_BIN" ]; then
            echo 'Sparkle binaries were not found in DerivedData.' >&2
            exit 1
          fi
          mkdir -p sparkle-archives
          cp ResizeMe.zip sparkle-archives/
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Release notes for ${GITHUB_REF_NAME}" > "sparkle-archives/ResizeMe ${VERSION}.txt"
          echo "$SPARKLE_PRIVATE_KEY" > sparkle-private-key.txt
          "$SPARKLE_BIN/generate_appcast" \
            --ed-key-file sparkle-private-key.txt \
            --download-url-prefix "https://github.com/burkeholland/resize-me/releases/download/${GITHUB_REF_NAME}/" \
            --release-notes-url-prefix "https://github.com/burkeholland/resize-me/releases/tag/${GITHUB_REF_NAME}" \
            --output appcast.xml \
            sparkle-archives
          mkdir -p docs
          cp sparkle-archives/appcast.xml docs/appcast.xml

      - name: Calculate SHA256
        run: |
          shasum -a 256 ResizeMe.zip > ResizeMe.zip.sha256
          cat ResizeMe.zip.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ResizeMe ${{ github.ref_name }}
          body: |
            ## Release Notes

            See the changelog for details.

            ### Downloads
            - `ResizeMe.zip` — direct macOS app archive
          files: |
            ResizeMe.zip
            ResizeMe.zip.sha256
            docs/appcast.xml
          draft: false
          prerelease: false

      - name: Publish appcast to docs
        if: github.ref_type == 'tag'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/appcast.xml
          git commit -m "chore: update appcast for $GITHUB_REF_NAME" || true
          git push origin HEAD:main || true

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
