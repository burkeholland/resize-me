name: PR Windows Smoke Build

on:
  pull_request:
    paths:
      - 'ResizeMe/**'
      - '!ResizeMe/frontend/node_modules/**'
      - '.github/workflows/pr-windows-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-windows-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows smoke artifact
        working-directory: ResizeMe
        run: wails build -platform windows/amd64 -o ResizeMe-pr-smoke.exe
