name: Windows Release

on:
  push:
    tags:
      - 'v*.*.*-windows'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: ResizeMe-windows-amd64.exe
          - os: windows-latest
            platform: windows/arm64
            artifact: ResizeMe-windows-arm64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        working-directory: ResizeMe
        run: wails build -platform ${{ matrix.platform }} -o ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ResizeMe/build/bin/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ResizeMe ${{ github.ref_name }}
          body: |
            Windows release from commit ${{ github.sha }}.

            **Downloads:**
            - `ResizeMe-windows-amd64.exe` — Windows x64
            - `ResizeMe-windows-arm64.exe` — Windows ARM64
          files: artifacts/*
          generate_release_notes: true
